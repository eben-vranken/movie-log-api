services:
  postgres:
    image: postgres:18.4
    container_name: movie_log
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: movies
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d movies"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: